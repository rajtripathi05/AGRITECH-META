id: AgriDecisionEnv-v3
name: AgriDecisionEnv-v3
description: >
  Sustainable Farming Decision Environment for reinforcement learning.
  An agent manages crop selection, fertilizer, and irrigation across
  multiple seasons to maximize yield while maintaining long-term soil
  health and resource sustainability.

version: "3.0.0"

# Entrypoint metadata used by local tooling.
entrypoint: inference.py
environment_class: AgriEnv
environment_module: env

episode_length: 5
scenarios:
  - default
  - fertile
  - drought
  - degraded
early_termination: true

observation_space:
  nitrogen: {type: float, range: [0.0, 1.0]}
  moisture: {type: float, range: [0.0, 1.0]}
  soil_quality: {type: float, range: [0.0, 1.0]}
  last_crop: {type: str, values: [rice, wheat, none]}
  season: {type: int, range: [0, 10]}
  weather: {type: str, values: [rainy, normal, drought]}
  groundwater: {type: float, range: [0.0, 1.0]}
  budget: {type: float}

action_space:
  crop: {type: str, values: [rice, wheat, none]}
  fertilizer: {type: float, range: [0.0, 1.0]}
  irrigation: {type: float, range: [0.0, 1.0]}

reward:
  type: float
  range: [0.0, 1.0]
  normalized: true
  components:
    - yield_score
    - soil_quality_bonus
    - fertilizer_penalty
    - delayed_fertilizer_penalty
    - irrigation_penalty
    - monocrop_penalty
    - groundwater_penalty
    - budget_penalty

# Validator-facing task manifest.
# The hackathon validator appears to discover tasks via this list shape
# and the HTTP grader paths below rather than Python import strings.
tasks:
  - id: easy
    difficulty: easy
    max_steps: 1
    description: Single-step yield maximization
    grader: /grade/easy
  - id: medium
    difficulty: medium
    max_steps: 3
    description: Balance soil health and yield over 3 seasons
    grader: /grade/medium
  - id: hard
    difficulty: hard
    max_steps: 5
    description: Full episode with stochastic weather, delayed effects, constraints
    grader: /grade/hard

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  validate: GET /validate

baseline_agents:
  random:
    file: baseline_agents.py
    entrypoint: random_policy
  rule_based:
    file: baseline_agents.py
    entrypoint: rule_based_policy
  greedy:
    file: baseline_agents.py
    entrypoint: greedy_policy

models:
  recommended:
    - Qwen/Qwen2.5-7B-Instruct
    - meta-llama/Meta-Llama-3-8B-Instruct
  inference_api: https://router.huggingface.co/v1

metadata:
  domain: agriculture
  tags: [rl, sustainability, multi-objective, delayed-rewards, resource-constraints]
  requires_gpu: false
  cpu_compatible: true
  python: ">=3.10"
  dependencies:
    - pydantic>=2.0
    - openai>=1.0
